# Enable OpenThread Extension mechanism
CONFIG_OPENTHREAD_CUSTOM_PARAMETERS=" -DOPENTHREAD_SPINEL_CONFIG_VENDOR_HOOK_ENABLE=1"

# Enable detailed logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_OPENTHREAD_DEBUG=y
CONFIG_OPENTHREAD_LOG_LEVEL_DEBG=y
CONFIG_LOG_BACKEND_SHOW_COLOR=y
CONFIG_LOG_BACKEND_FORMAT_TIMESTAMP=y

# Increase log buffer to prevent drops
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048

# Increase shell stack size for crypto operations
CONFIG_SHELL_STACK_SIZE=8192
