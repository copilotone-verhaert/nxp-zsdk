# Increase Bluetooth ACL buffers for A2DP streaming
CONFIG_BT_BUF_ACL_TX_COUNT=15
CONFIG_BT_BUF_ACL_RX_COUNT_EXTRA=8
CONFIG_BT_BUF_EVT_RX_COUNT=20
CONFIG_BT_L2CAP_TX_BUF_COUNT=15
CONFIG_BT_L2CAP_TX_FRAG_COUNT=10
CONFIG_BT_CONN_TX_MAX=15

# Increase Bluetooth RX stack size to prevent overflow
CONFIG_BT_RX_STACK_SIZE=2048

# Increase network packet buffers for WiFi coexistence
CONFIG_NET_PKT_RX_COUNT=140
CONFIG_NET_PKT_TX_COUNT=100
CONFIG_NET_BUF_RX_COUNT=160
CONFIG_NET_BUF_TX_COUNT=110

# Increase heap memory pool
CONFIG_HEAP_MEM_POOL_SIZE=65536

# Increase system workqueue stack
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Increase WiFi task stacks for coexistence
CONFIG_NXP_WIFI_WLCMGR_TASK_STACK_SIZE=6144
CONFIG_NXP_WIFI_TX_TASK_STACK_SIZE=5120